<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopPerks - Cupons para Funcionários</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      /* THEME VARIABLES DEFINITION */
      :root {
        /* Default Dark (Gunmetal/Chumbo Neutro + Gold) */
        --color-primary: 212 175 55;    /* #D4AF37 */
        --color-bg-main: 24 24 27;      /* #18181B (Zinc 950) */
        --color-bg-surface: 39 39 42;   /* #27272A (Zinc 800) */
        --color-text-main: 244 244 245; /* #F4F4F5 (Zinc 100) */
        --color-text-muted: 161 161 170; /* #A1A1AA (Zinc 400) */
        --color-border: 63 63 70;       /* #3F3F46 (Zinc 700) */

        /* Solid Settings (No Glass) */
        --glass-bg: 39 39 42;
        --glass-opacity: 1; /* Solid Opacity */
        --glass-border: 82 82 91; /* Zinc 600 */
        --glass-border-opacity: 1;
      }

      [data-theme="emerald"] {
        /* Emerald + Light Gray */
        --color-primary: 0 220 130;     /* #00DC82 */
        --color-bg-main: 241 245 249;   /* #F1F5F9 */
        --color-bg-surface: 255 255 255; /* #FFFFFF */
        --color-text-main: 24 24 27;    /* #18181B */
        --color-text-muted: 113 113 122; /* #71717A */
        --color-border: 228 228 231;    /* #E4E4E7 */

        --glass-bg: 255 255 255;
        --glass-opacity: 1;
        --glass-border: 228 228 231;
        --glass-border-opacity: 1;
      }

      [data-theme="indigo"] {
        /* Indigo + White */
        --color-primary: 99 102 241;    /* #6366F1 */
        --color-bg-main: 255 255 255;   /* #FFFFFF */
        --color-bg-surface: 250 250 250; /* #FAFAFA */
        --color-text-main: 24 24 27;    /* #18181B */
        --color-text-muted: 113 113 122; /* #71717A */
        --color-border: 228 228 231;    /* #E4E4E7 */

        --glass-bg: 255 255 255;
        --glass-opacity: 1;
        --glass-border: 228 228 231;
        --glass-border-opacity: 1;
      }

      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: rgb(var(--color-bg-main));
        color: rgb(var(--color-text-main));
        transition: background-color 0.5s ease, color 0.5s ease;
      }

      /* Global Panel Class - SOLID (Glass Removed) */
      .glass-panel {
        background-color: rgb(var(--glass-bg)); /* Removed RGBA alpha var */
        /* backdrop-filter: blur(8px); REMOVED */
        /* -webkit-backdrop-filter: blur(8px); REMOVED */
        border: 1px solid rgba(var(--glass-border), var(--glass-border-opacity));
      }
      
      /* Input Styles based on theme - Solid */
      .input-base {
        background-color: rgb(var(--color-bg-surface)); /* Solid */
        color: rgb(var(--color-text-main));
        border: 1px solid rgb(var(--color-border));
      }
      .input-base:focus {
        background-color: rgb(var(--color-bg-surface));
        border-color: rgb(var(--color-primary));
        outline: none;
        box-shadow: 0 0 0 2px rgba(var(--color-primary), 0.2);
      }
      .input-base::placeholder {
        color: rgb(var(--color-text-muted));
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      #reader {
        width: 100%;
        border-radius: 1rem;
        overflow: hidden;
        border: 2px solid rgba(var(--color-border), 0.5);
      }
      #reader__scan_region {
        background: transparent;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
            },
            colors: {
              // Using CSS variables with <alpha-value> placeholder for opacity support
              primary: {
                DEFAULT: 'rgb(var(--color-primary) / <alpha-value>)',
                400: 'rgb(var(--color-primary) / <alpha-value>)',
                500: 'rgb(var(--color-primary) / <alpha-value>)', 
                600: 'rgb(var(--color-primary) / <alpha-value>)', 
                900: 'rgb(var(--color-primary) / 0.2)', 
              },
              main: 'rgb(var(--color-bg-main) / <alpha-value>)',
              surface: 'rgb(var(--color-bg-surface) / <alpha-value>)',
              text: {
                main: 'rgb(var(--color-text-main) / <alpha-value>)',
                muted: 'rgb(var(--color-text-muted) / <alpha-value>)',
              },
              border: 'rgb(var(--color-border) / <alpha-value>)',
            },
            keyframes: {
              'fade-in-up': {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'pop-in': {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              'scale-out': {
                '0%': { opacity: '1', transform: 'scale(1)' },
                '100%': { opacity: '0', transform: 'scale(0.95)' },
              },
              'shimmer': {
                '100%': { transform: 'translateX(100%)' },
              },
              'blob': {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              }
            },
            animation: {
              'fade-in-up': 'fade-in-up 0.5s ease-out forwards',
              'pop-in': 'pop-in 0.3s ease-out forwards',
              'scale-out': 'scale-out 0.2s ease-in forwards',
              'blob': 'blob 7s infinite',
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "html5-qrcode": "https://esm.sh/html5-qrcode@2.3.8",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
  }
}
</script>
</head>
  <body class="bg-main text-text-main transition-colors duration-500 min-h-screen">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
